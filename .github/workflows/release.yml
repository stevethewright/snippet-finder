name: Build & Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 22-fix-release-release-v010

  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: snippet-finder-win
            path: dist/snippet-finder.exe

          - os: macos-latest
            artifact: snippet-finder-mac
            path: dist/snippet-finder.app

          - os: ubuntu-latest
            artifact: snippet-finder-linux
            path: dist/snippet-finder

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      # Linux only — install Qt/display dependencies
      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libxcb-cursor0 \
            libxcb-xinerama0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libegl1 \
            libgl1

      - name: Build with PyInstaller
        run: uv run pyinstaller --onefile --windowed --distpath dist src/snippet_finder/__main__.py --name snippet_finder

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.path }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: snippet-finder-${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            snippet-finder-win/snippet-finder.exe
            snippet-finder-mac/snippet-finder.app
            snippet-finder-linux/snippet-finder
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
